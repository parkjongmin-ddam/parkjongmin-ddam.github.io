<svg viewBox="0 0 820 475" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <rect x="0" y="0" width="820" height="475" fill="#FBFAF7"/>
  <text x="52" y="46" fill="#8A857B" font-size="13" letter-spacing="1.4">GUIDE (FEEDFORWARD) · SENSOR (FEEDBACK)</text>

  <!-- guide -->
  <rect x="52" y="110" width="210" height="210" rx="14" fill="#E4E0D7" stroke="#C7C1B5" stroke-width="1.5"/>
  <text x="74" y="150" fill="#2A2822" font-size="18" font-weight="600">가이드</text>
  <text x="74" y="172" fill="#948E83" font-size="12.5">feedforward · 행동 전</text>
  <text x="74" y="206" fill="#4A463E" font-size="13.5">· 시스템 프롬프트</text>
  <text x="74" y="234" fill="#4A463E" font-size="13.5">· AGENTS.md / CLAUDE.md</text>
  <text x="74" y="262" fill="#4A463E" font-size="13.5">· 제약 문서</text>
  <text x="74" y="290" fill="#4A463E" font-size="13.5">· 툴 정의</text>

  <!-- model -->
  <rect x="350" y="175" width="150" height="80" rx="14" fill="#D9D3C7" stroke="#BAB3A5" stroke-width="1.5"/>
  <text x="425" y="210" fill="#2A2822" font-size="18" font-weight="600" text-anchor="middle">모델</text>
  <text x="425" y="232" fill="#8C867B" font-size="12.5" text-anchor="middle">행동 (act)</text>

  <!-- sensor -->
  <rect x="588" y="110" width="210" height="210" rx="14" fill="#E4E0D7" stroke="#C7C1B5" stroke-width="1.5"/>
  <text x="610" y="150" fill="#2A2822" font-size="18" font-weight="600">센서</text>
  <text x="610" y="172" fill="#948E83" font-size="12.5">feedback · 행동 후</text>
  <text x="610" y="206" fill="#4A463E" font-size="13.5">· 테스트</text>
  <text x="610" y="234" fill="#4A463E" font-size="13.5">· 린트 / 빌드</text>
  <text x="610" y="262" fill="#4A463E" font-size="13.5">· eval (LLM-judge)</text>
  <text x="610" y="290" fill="#4A463E" font-size="13.5">· 로그 / 관찰가능성</text>

  <!-- flow arrows -->
  <line x1="262" y1="215" x2="342" y2="215" stroke="#7C766B" stroke-width="2"/>
  <path d="M 342 215 l -11 -6 l 0 12 z" fill="#7C766B"/>
  <line x1="500" y1="215" x2="580" y2="215" stroke="#7C766B" stroke-width="2"/>
  <path d="M 580 215 l -11 -6 l 0 12 z" fill="#7C766B"/>

  <!-- feedback steering loop -->
  <path d="M 693 320 C 693 398, 157 398, 157 324" fill="none" stroke="#B4532A" stroke-width="2"/>
  <path d="M 157 324 l -6 12 l 12 0 z" fill="#B4532A"/>
  <text x="425" y="382" fill="#B4532A" font-size="13" text-anchor="middle">실패를 관찰해 → 하네스를 고친다 (steering loop)</text>

  <text x="52" y="456" fill="#8A857B" font-size="12.5">각 통제는 결정론적(computational: 테스트·린터)일 수도, 추론적(inferential: AI 리뷰·LLM-judge)일 수도 있다.</text>
</svg>
