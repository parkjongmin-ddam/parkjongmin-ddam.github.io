<svg viewBox="0 0 820 560" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <rect x="0" y="0" width="820" height="560" fill="#FBFAF7"/>

  <!-- eyebrow -->
  <text x="52" y="46" fill="#8A857B" font-size="13" letter-spacing="1.5">RALPH ⊂ HARNESS ⊂ LOOP ENGINEERING</text>

  <!-- fleet spiral-back arrow -->
  <path d="M 690 96 C 792 44, 812 150, 706 158" fill="none" stroke="#B4532A" stroke-width="2"/>
  <path d="M 706 158 l 11 -9 l -2 13 z" fill="#B4532A"/>
  <text x="726" y="70" fill="#B4532A" font-size="12.5">함대(fleet)를 운영하면</text>
  <text x="726" y="88" fill="#B4532A" font-size="12.5">→ 다시 하네스 설계로</text>

  <!-- outer: loop engineering -->
  <rect x="50" y="100" width="720" height="420" rx="16" fill="#EFEDE7" stroke="#D2CDC3" stroke-width="1.5"/>
  <text x="74" y="134" fill="#2A2822" font-size="18" font-weight="600">루프 엔지니어링</text>
  <text x="222" y="134" fill="#9A948A" font-size="13">Loop Engineering</text>
  <text x="74" y="156" fill="#6B665C" font-size="13.5">여러 하네스를 자동으로 굴리는 "공장"</text>

  <!-- middle: harness -->
  <rect x="120" y="176" width="580" height="300" rx="14" fill="#E4E0D7" stroke="#C7C1B5" stroke-width="1.5"/>
  <text x="144" y="210" fill="#2A2822" font-size="18" font-weight="600">하네스 엔지니어링</text>
  <text x="308" y="210" fill="#948E83" font-size="13">Harness Engineering</text>
  <text x="144" y="232" fill="#6B665C" font-size="13.5">에이전트 하나가 도는 환경 · 가이드 + 센서</text>

  <!-- inner: ralph -->
  <rect x="205" y="252" width="410" height="150" rx="12" fill="#D9D3C7" stroke="#BAB3A5" stroke-width="1.5"/>
  <text x="229" y="300" fill="#2A2822" font-size="17" font-weight="600">랠프 위검 루프</text>
  <text x="371" y="300" fill="#8C867B" font-size="12.5">Ralph Wiggum Loop</text>
  <text x="229" y="322" fill="#6B665C" font-size="13">단일 에이전트 · 새 컨텍스트 · 디스크 상태</text>

  <!-- loop motif inside ralph -->
  <g transform="translate(535,352)">
    <path d="M -13 0 A 13 13 0 1 1 -3 12" fill="none" stroke="#7C766B" stroke-width="2"/>
    <path d="M -3 12 l -9 -1 l 6 8 z" fill="#7C766B"/>
  </g>

  <!-- caption strip -->
  <text x="52" y="548" fill="#8A857B" font-size="12.5">추상화 층위가 한 칸씩 올라갈 뿐, 완전히 새로운 개념이 아니다.</text>
</svg>
