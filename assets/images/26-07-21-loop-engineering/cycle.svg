<svg viewBox="0 0 820 480" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <rect x="0" y="0" width="820" height="480" fill="#FBFAF7"/>
  <text x="52" y="46" fill="#8A857B" font-size="13" letter-spacing="1.4">ACT → OBSERVE → DECIDE → REPEAT</text>

  <!-- cycle ring -->
  <circle cx="410" cy="250" r="150" fill="none" stroke="#B0A99C" stroke-width="2"/>

  <!-- clockwise arrowheads on the ring -->
  <g transform="translate(516,144) rotate(45)"><path d="M -6 -5 L 8 0 L -6 5 Z" fill="#B0A99C"/></g>
  <g transform="translate(516,356) rotate(135)"><path d="M -6 -5 L 8 0 L -6 5 Z" fill="#B0A99C"/></g>
  <g transform="translate(304,356) rotate(225)"><path d="M -6 -5 L 8 0 L -6 5 Z" fill="#B0A99C"/></g>
  <g transform="translate(304,144) rotate(315)"><path d="M -6 -5 L 8 0 L -6 5 Z" fill="#B0A99C"/></g>

  <!-- nodes -->
  <rect x="320" y="68" width="180" height="64" rx="12" fill="#E4E0D7" stroke="#C7C1B5" stroke-width="1.5"/>
  <text x="410" y="96" fill="#2A2822" font-size="15" font-weight="600" text-anchor="middle">act · 행동</text>
  <text x="410" y="116" fill="#6B665C" font-size="12" text-anchor="middle">이전 최고본을 수정</text>

  <rect x="470" y="218" width="180" height="64" rx="12" fill="#E4E0D7" stroke="#C7C1B5" stroke-width="1.5"/>
  <text x="560" y="246" fill="#2A2822" font-size="15" font-weight="600" text-anchor="middle">observe · 관찰</text>
  <text x="560" y="266" fill="#6B665C" font-size="12" text-anchor="middle">렌더링해 결과 확인</text>

  <rect x="320" y="368" width="180" height="64" rx="12" fill="#E4E0D7" stroke="#C7C1B5" stroke-width="1.5"/>
  <text x="410" y="396" fill="#2A2822" font-size="15" font-weight="600" text-anchor="middle">decide · 결정</text>
  <text x="410" y="416" fill="#6B665C" font-size="12" text-anchor="middle">점수·비평 기록</text>

  <rect x="170" y="218" width="180" height="64" rx="12" fill="#E4E0D7" stroke="#C7C1B5" stroke-width="1.5"/>
  <text x="260" y="246" fill="#2A2822" font-size="15" font-weight="600" text-anchor="middle">repeat · 반복</text>
  <text x="260" y="266" fill="#6B665C" font-size="12" text-anchor="middle">상태 갱신 후 재시작</text>

  <!-- stop condition -->
  <text x="410" y="245" fill="#B4532A" font-size="13" font-weight="600" text-anchor="middle">종료 조건</text>
  <text x="410" y="265" fill="#B4532A" font-size="12.5" text-anchor="middle">목표 유사도 90%면 정지</text>

  <text x="52" y="465" fill="#8A857B" font-size="12.5">SVG처럼 한 번에 되는 작업엔 이 루프 자체가 낭비다.</text>
</svg>
