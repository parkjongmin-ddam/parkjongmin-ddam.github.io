<svg width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 입력 -->
  <g>
    <rect x="265" y="20" width="150" height="44" rx="8" stroke-width="0.5" style="fill:rgb(68, 68, 65);stroke:rgb(180, 178, 169);"/>
    <text x="340" y="36" text-anchor="middle" dominant-baseline="central" style="fill:rgb(211, 209, 199);font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:14px;font-weight:500;">입력값</text>
    <text x="340" y="52" text-anchor="middle" dominant-baseline="central" style="fill:rgb(180, 178, 169);font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;">{"country": "대한민국"}</text>
  </g>

  <!-- 분기 파이프 -->
  <path d="M340 64 L340 85 L160 85 L160 108" fill="none" stroke="rgb(194, 192, 182)" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M340 64 L340 85 L340 108" fill="none" stroke="rgb(194, 192, 182)" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M340 64 L340 85 L520 85 L520 108" fill="none" stroke="rgb(194, 192, 182)" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 동시 실행 레이블 -->
  <text x="340" y="100" text-anchor="middle" fill="rgb(194, 192, 182)" style="font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;">ThreadPoolExecutor로 동시 실행</text>

  <!-- 체인 1 -->
  <g>
    <rect x="80" y="108" width="160" height="54" rx="8" stroke-width="0.5" style="fill:rgb(60, 52, 137);stroke:rgb(175, 169, 236);"/>
    <text x="160" y="126" text-anchor="middle" dominant-baseline="central" style="fill:rgb(206, 203, 246);font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:14px;font-weight:500;">capital 체인</text>
    <text x="160" y="146" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175, 169, 236);font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;">수도를 묻는 prompt+model</text>
  </g>

  <!-- 체인 2 -->
  <g>
    <rect x="260" y="108" width="160" height="54" rx="8" stroke-width="0.5" style="fill:rgb(60, 52, 137);stroke:rgb(175, 169, 236);"/>
    <text x="340" y="126" text-anchor="middle" dominant-baseline="central" style="fill:rgb(206, 203, 246);font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:14px;font-weight:500;">population 체인</text>
    <text x="340" y="146" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175, 169, 236);font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;">인구를 묻는 prompt+model</text>
  </g>

  <!-- 체인 3 -->
  <g>
    <rect x="440" y="108" width="160" height="54" rx="8" stroke-width="0.5" style="fill:rgb(60, 52, 137);stroke:rgb(175, 169, 236);"/>
    <text x="520" y="126" text-anchor="middle" dominant-baseline="central" style="fill:rgb(206, 203, 246);font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:14px;font-weight:500;">area 체인</text>
    <text x="520" y="146" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175, 169, 236);font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;">면적을 묻는 prompt+model</text>
  </g>

  <!-- 시간 비교 박스 -->
  <rect x="40" y="180" width="600" height="50" rx="6" fill="none" stroke="rgba(222, 220, 209, 0.15)" stroke-dasharray="3 3"/>
  <text x="340" y="197" text-anchor="middle" fill="rgb(194, 192, 182)" style="font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;">직렬 실행: 2초 + 2초 + 2초 = 6초</text>
  <text x="340" y="218" text-anchor="middle" style="fill:rgb(250, 249, 245);font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:14px;font-weight:500;">병렬 실행: max(2초, 2초, 2초) = 2초 (3배 빠름)</text>

  <!-- 합류 파이프 -->
  <path d="M160 162 L160 248 L310 248" fill="none" stroke="rgb(194, 192, 182)" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M340 162 L340 248" fill="none" stroke="rgb(194, 192, 182)" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M520 162 L520 248 L370 248" fill="none" stroke="rgb(194, 192, 182)" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 결과 딕셔너리 -->
  <g>
    <rect x="190" y="248" width="300" height="78" rx="8" stroke-width="0.5" style="fill:rgb(8, 80, 65);stroke:rgb(93, 202, 165);"/>
    <text x="340" y="268" text-anchor="middle" dominant-baseline="central" style="fill:rgb(159, 225, 203);font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:14px;font-weight:500;">결과 딕셔너리</text>
    <text x="340" y="287" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93, 202, 165);font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;">"capital": "서울입니다"</text>
    <text x="340" y="303" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93, 202, 165);font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;">"population": "약 5,170만 명"</text>
    <text x="340" y="319" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93, 202, 165);font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;">"area": "약 10만 km²"</text>
  </g>
</svg>
