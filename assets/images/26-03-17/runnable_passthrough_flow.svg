<svg width="100%" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 왼쪽: 문제 상황 -->
  <text x="160" y="28" text-anchor="middle" style="fill:rgb(250, 249, 245);font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:14px;font-weight:500;">문제 상황</text>
  <g>
    <rect x="40" y="42" width="240" height="36" rx="6" stroke-width="0.5" style="fill:rgb(113, 43, 19);stroke:rgb(240, 153, 123);"/>
    <text x="160" y="56" text-anchor="middle" dominant-baseline="central" style="fill:rgb(245, 196, 179);font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:14px;font-weight:500;">chain.invoke("대한민국")</text>
    <text x="160" y="72" text-anchor="middle" dominant-baseline="central" style="fill:rgb(240, 153, 123);font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;">문자열로 그냥 넣으면?</text>
  </g>
  <line x1="160" y1="79" x2="160" y2="106" marker-end="url(#arrow)" stroke="rgb(156, 154, 146)" stroke-width="1.5"/>
  <g>
    <rect x="60" y="106" width="200" height="36" rx="6" stroke-width="0.5" style="fill:rgb(68, 68, 65);stroke:rgb(180, 178, 169);"/>
    <text x="160" y="120" text-anchor="middle" dominant-baseline="central" style="fill:rgb(211, 209, 199);font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:14px;font-weight:500;">PromptTemplate</text>
    <text x="160" y="136" text-anchor="middle" dominant-baseline="central" style="fill:rgb(180, 178, 169);font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;">{country} 변수 기대 중</text>
  </g>
  <line x1="160" y1="143" x2="160" y2="168" marker-end="url(#arrow)" stroke="rgb(156, 154, 146)" stroke-width="1.5"/>
  <g>
    <rect x="60" y="168" width="200" height="36" rx="6" stroke-width="0.5" style="fill:rgb(121, 31, 31);stroke:rgb(240, 149, 149);"/>
    <text x="160" y="182" text-anchor="middle" dominant-baseline="central" style="fill:rgb(247, 193, 193);font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:14px;font-weight:500;">ValueError!</text>
    <text x="160" y="198" text-anchor="middle" dominant-baseline="central" style="fill:rgb(240, 149, 149);font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;">str → dict 불일치</text>
  </g>

  <!-- 구분선 -->
  <line x1="320" y1="30" x2="320" y2="340" stroke="rgba(222, 220, 209, 0.15)" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- 오른쪽: 해결 -->
  <text x="500" y="28" text-anchor="middle" style="fill:rgb(250, 249, 245);font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:14px;font-weight:500;">RunnablePassthrough 해결</text>
  <g>
    <rect x="360" y="42" width="280" height="36" rx="6" stroke-width="0.5" style="fill:rgb(8, 80, 65);stroke:rgb(93, 202, 165);"/>
    <text x="500" y="56" text-anchor="middle" dominant-baseline="central" style="fill:rgb(159, 225, 203);font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:14px;font-weight:500;">chain.invoke("대한민국")</text>
    <text x="500" y="72" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93, 202, 165);font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;">문자열로 편하게 넣음</text>
  </g>
  <line x1="500" y1="79" x2="500" y2="106" marker-end="url(#arrow)" stroke="rgb(156, 154, 146)" stroke-width="1.5"/>
  <g>
    <rect x="360" y="106" width="280" height="46" rx="6" stroke-width="0.5" style="fill:rgb(99, 56, 6);stroke:rgb(239, 159, 39);"/>
    <text x="500" y="122" text-anchor="middle" dominant-baseline="central" style="fill:rgb(250, 199, 117);font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:14px;font-weight:500;">{"country": RunnablePassthrough()}</text>
    <text x="500" y="140" text-anchor="middle" dominant-baseline="central" style="fill:rgb(239, 159, 39);font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;">문자열 → 딕셔너리로 자동 변환</text>
  </g>
  <line x1="500" y1="153" x2="500" y2="178" marker-end="url(#arrow)" stroke="rgb(156, 154, 146)" stroke-width="1.5"/>
  <g>
    <rect x="380" y="178" width="240" height="36" rx="6" stroke-width="0.5" style="fill:rgb(68, 68, 65);stroke:rgb(180, 178, 169);"/>
    <text x="500" y="192" text-anchor="middle" dominant-baseline="central" style="fill:rgb(211, 209, 199);font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:14px;font-weight:500;">PromptTemplate</text>
    <text x="500" y="208" text-anchor="middle" dominant-baseline="central" style="fill:rgb(180, 178, 169);font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;">{"country": "대한민국"} 수신</text>
  </g>
  <line x1="500" y1="215" x2="500" y2="240" marker-end="url(#arrow)" stroke="rgb(156, 154, 146)" stroke-width="1.5"/>
  <g>
    <rect x="380" y="240" width="240" height="36" rx="6" stroke-width="0.5" style="fill:rgb(8, 80, 65);stroke:rgb(93, 202, 165);"/>
    <text x="500" y="254" text-anchor="middle" dominant-baseline="central" style="fill:rgb(159, 225, 203);font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:14px;font-weight:500;">model → parser</text>
    <text x="500" y="270" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93, 202, 165);font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;">정상 동작</text>
  </g>

  <!-- assign 설명 박스 -->
  <rect x="40" y="300" width="600" height="62" rx="8" fill="none" stroke="rgba(222, 220, 209, 0.3)" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="340" y="320" text-anchor="middle" style="fill:rgb(250, 249, 245);font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:14px;font-weight:500;">.assign() → 기존 딕셔너리에 키를 추가하면서 통과</text>
  <text x="340" y="338" text-anchor="middle" style="fill:rgb(194, 192, 182);font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;">RunnablePassthrough.assign(context=retriever) → 입력 유지 + context 키 추가</text>
  <text x="340" y="354" text-anchor="middle" style="fill:rgb(194, 192, 182);font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;">RAG에서 question을 그대로, context는 검색 결과로 채울 때 핵심 패턴</text>
</svg>
